<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Chatbot Aqiqah Lazizah</title>

<style>
  /* RESET & BASE */
  html, body { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ece5dd; overflow: hidden; }
  
  /* FULL WIDTH CONTAINER */
  #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; background: white; position: relative; }

  /* HEADER & HAMBURGER */
  #header { background: #075e54; color: white; padding: 10px 15px; display: flex; align-items: center; gap: 12px; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  #header img { border-radius: 50%; width: 40px; height: 40px; object-fit: cover; border: 1px solid rgba(255,255,255,0.3); }
  #hamburger { font-size: 24px; cursor: pointer; padding: 5px; }

  /* MENU DROPDOWN */
  #menu-container { 
    display: none; position: absolute; top: 60px; left: 10px; background: white; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-radius: 8px; z-index: 1000; width: 220px; 
  }
  #menu-container ul { list-style: none; padding: 5px 0; margin: 0; }
  #menu-container li { padding: 12px 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 14px; color: #333; transition: 0.2s; }
  #menu-container li:hover { background: #f5f5f5; }

  /* CHAT AREA */
  #chat { flex: 1; padding: 15px; overflow-y: auto; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: #e5ddd5; display: flex; flex-direction: column; gap: 8px; }

  /* BUBBLE CHAT */
  .bot, .user { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.4; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
  .bot { background: white; align-self: flex-start; border-top-left-radius: 2px; color: #303030; }
  .user { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 2px; color: #303030; }

  /* DOT ANIMATION */
  .typing { display: flex; gap: 4px; padding: 10px 15px; background: white; align-self: flex-start; border-radius: 12px; margin-bottom: 8px; }
  .dot { width: 8px; height: 8px; background: #bbb; border-radius: 50%; animation: jump 1.4s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes jump { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }

  /* INPUT AREA */
  #input-area { display: flex; padding: 10px; background: #f0f0f0; gap: 8px; align-items: center; }
  #input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 15px; }
  #send-btn { background: #128c7e; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  #send-btn:disabled { background: #ccc; }

  #copyright { text-align: center; font-size: 10px; color: #999; padding-bottom: 5px; background: #f0f0f0; }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="hamburger" onclick="toggleMenu()">☰</div>
    <img src="https://i.pravatar.cc/100?u=delisa" alt="Delisa">
    <div style="flex:1">
      <b style="font-size: 16px;">Delisa</b><br>
      <small style="opacity: 0.8;">Online - CS Aqiqah Lazizah</small>
    </div>
  </div>

  <div id="menu-container">
    <ul>
      <li onclick="quickChat('Info Aset Konten Gratis')">🎁 Aset Konten Gratis</li>
      <li onclick="quickChat('Bonus Aplikasi Kasir')">✨ Bonus Aplikasi Kasir</li>
      <li onclick="quickChat('Opsi Isi Token')">🪙 Opsi Isi Token</li>
      <li onclick="quickChat('Pesan Sekarang')">🛒 Pesan Sekarang</li>
    </ul>
  </div>

  <div id="chat"></div>

  <div id="input-area">
    <input id="input" placeholder="Ketik pesan..." autocomplete="off">
    <button id="send-btn" onclick="send()">➤</button>
  </div>
  <div id="copyright">Powered by <a href="https://kulina.biz.id" style="color:#999;text-decoration:none;">KulinaSystem</a></div>
</div>

<script>
let state = { step: "start", data: {} };

function toggleMenu() {
  const menu = document.getElementById("menu-container");
  menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

function addMessage(text, cls) {
  const chatArea = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = cls;
  // Gunakan innerHTML agar bisa merender gambar/tag dari Sheets
  div.innerHTML = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const chatArea = document.getElementById("chat");
  const loader = document.createElement("div");
  loader.id = "typing-loader";
  loader.className = "typing";
  loader.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chatArea.appendChild(loader);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideTyping() {
  const loader = document.getElementById("typing-loader");
  if (loader) loader.remove();
}

function quickChat(msg) {
  document.getElementById("input").value = msg;
  toggleMenu();
  send();
}

async function send() {
  const input = document.getElementById("input");
  const btn = document.getElementById("send-btn");
  const text = input.value.trim();
  
  if (!text || btn.disabled) return;

  btn.disabled = true;
  input.disabled = true;
  addMessage(text, "user");
  input.value = "";

  showTyping(); // Munculkan animasi titik-titik

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, state: state })
    });
    const data = await response.json();
    
    setTimeout(() => { // Beri jeda sedikit agar animasi terasa natural
      hideTyping();
      if (data.reply) addMessage(data.reply, "bot");
    }, 1000);

  } catch (error) {
    hideTyping();
    addMessage("Koneksi terputus, coba lagi ya Pak/Bu 🙏", "bot");
  } finally {
    btn.disabled = false;
    input.disabled = false;
    input.focus();
  }
}

document.getElementById("input").addEventListener("keypress", (e) => {
  if (e.key === "Enter") send();
});

window.onload = () => {
  setTimeout(() => { addMessage("Sampurasun! Saya Delisa 😊 Ada yang bisa dibantu?", "bot"); }, 500);
};
</script>
</body>
</html>
